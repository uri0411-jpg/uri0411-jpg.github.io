<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f2e6d7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/app.css" />
  <title>דמדומים</title>
  <meta name="description" content="תחזית חכמה לצפייה בשקיעה וזריחה — ציון איכות, זמן שקיעה והמלצות לוקיישן." />
  <meta property="og:title" content="דמדומים — תחזית שקיעה" />
  <meta property="og:description" content="תחזית חכמה לצפייה בשקיעה וזריחה — ציון איכות, זמן שקיעה והמלצות לוקיישן." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="./icons/icon-512.png" />
</head>
<body class="forecast-body">
  <div id="splash">
    <img class="splash-logo" src="./assets/backgrounds/hero-golden-hour.png" alt="דמדומים" />
    <div class="splash-title">דמדומים</div>
    <div class="splash-sub">Twilight • Sunset Forecast</div>
    <div class="splash-bar"><div class="splash-bar-fill"></div></div>
  </div>

  <main class="app-shell">
    <section class="hero hero--forecast">
      <div class="hero__bg" style="background-image:url('./assets/backgrounds/hero-golden-hour.png')"></div>
      <div class="hero__overlay"></div>
      <div class="hero__top">
        <img class="app-badge" src="./icons/icon-192.png" alt="דמדומים" />
        <button class="ghost-btn" id="btnShareApp" type="button" onclick="shareApp()">שתף</button>
      </div>
      <div class="hero__content">
        <div class="eyebrow">TWILIGHT • SUNSET FORECAST</div>
        <h1 class="hero__title">דמדומים</h1>
        <p class="hero__subtitle">תחזית חכמה לצפייה בשקיעה, ציון איכות, זמן שקיעה והמלצה לסוג הלוקיישן הנכון לערב הקרוב.</p>
        <div class="hero__search card card--glass card--compact">
          <div class="location-mini">
            <div>
              <div class="label">מיקום נוכחי</div>
              <strong id="locInfo">מאתר מיקום…</strong>
              <div class="muted" id="locCoords"></div>
            </div>
            <button id="btnGps" class="icon-btn" type="button" aria-label="GPS">📍</button>
          </div>
          <div class="search-inline">
            <button class="icon-btn" id="btnSearch" type="button" aria-label="חפש">🔎</button>
            <input class="city-input" id="placeInput" type="text" placeholder="חפש עיר / כתובת..." inputmode="search"
                   onkeydown="if(event.key==='Enter') document.getElementById('btnSearch').click()" />
            <button class="pill-btn pill-btn--muted" id="btnFav" type="button">הוסף ☆</button>
          </div>
        </div>
      </div>
    </section>

    <div class="page page--forecast">
      <div class="favorites-strip" id="favList"></div>
      <section id="mainContent" class="forecast-content">
        <div class="loading-state"><span>🌅</span><p>טוען תחזית...</p></div>
      </section>
      <footer class="footer-note">נתונים: Open‑Meteo • חישובי שמש: SunCalc</footer>
    </div>

  <!-- ─── התראות ─── -->
  <section id="notifSection" class="page page--forecast" style="display:none">
    <div class="card" style="margin-bottom:16px">
      <h3 style="font:700 22px 'Cormorant Garamond',serif;margin:0 0 10px">התראות</h3>
      <div id="notifStatus" class="notif-status"></div>
      <button id="notifPermBtn" class="pill-btn pill-btn--primary" style="width:100%;margin-top:10px;display:none">הפעל התראות</button>

      <div style="margin-top:18px;display:grid;gap:14px">
        <!-- שקיעה -->
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
          <input type="checkbox" id="notifSunsetOn" style="width:18px;height:18px;accent-color:var(--gold-strong)">
          <span>התראה לפני שקיעה</span>
        </label>
        <div id="sunsetTimingRow" style="display:none;padding-right:28px">
          <label class="field-row">
            <span class="field-row__label">דקות לפני</span>
            <input id="sunsetMin" class="range-input" type="range" min="5" max="120" step="5" value="30">
            <span class="field-row__value"><span id="sunsetMinVal">30</span> דק'</span>
          </label>
        </div>

        <!-- זריחה -->
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
          <input type="checkbox" id="notifSunriseOn" style="width:18px;height:18px;accent-color:var(--gold-strong)">
          <span>התראה לפני זריחה</span>
        </label>
        <div id="sunriseTimingRow" style="display:none;padding-right:28px">
          <label class="field-row">
            <span class="field-row__label">דקות לפני</span>
            <input id="sunriseMin" class="range-input" type="range" min="5" max="120" step="5" value="30">
            <span class="field-row__value"><span id="sunriseMinVal">30</span> דק'</span>
          </label>
        </div>

        <!-- שקיעה לפי ציון -->
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
          <input type="checkbox" id="notifSunsetScoreOn" style="width:18px;height:18px;accent-color:var(--gold-strong)">
          <span>התראה לשקיעה מיוחדת (לפי ציון)</span>
        </label>
        <div id="sunsetScoreRow" style="display:none;padding-right:28px;gap:8px">
          <label class="field-row">
            <span class="field-row__label">ציון מינימלי</span>
            <input id="sunsetScore" class="range-input" type="range" min="5" max="10" step="0.5" value="7">
            <span class="field-row__value"><span id="sunsetScoreVal">7</span></span>
          </label>
          <label class="field-row">
            <span class="field-row__label">דקות לפני</span>
            <input id="sunsetScoreMin" class="range-input" type="range" min="15" max="120" step="5" value="60">
            <span class="field-row__value"><span id="sunsetScoreTimeVal">60</span> דק'</span>
          </label>
        </div>

        <!-- זריחה לפי ציון -->
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
          <input type="checkbox" id="notifSunriseScoreOn" style="width:18px;height:18px;accent-color:var(--gold-strong)">
          <span>התראה לזריחה מיוחדת (לפי ציון)</span>
        </label>
        <div id="sunriseScoreRow" style="display:none;padding-right:28px;gap:8px">
          <label class="field-row">
            <span class="field-row__label">ציון מינימלי</span>
            <input id="sunriseScore" class="range-input" type="range" min="5" max="10" step="0.5" value="7">
            <span class="field-row__value"><span id="sunriseScoreVal">7</span></span>
          </label>
          <label class="field-row">
            <span class="field-row__label">דקות לפני</span>
            <input id="sunriseScoreMin" class="range-input" type="range" min="15" max="120" step="5" value="60">
            <span class="field-row__value"><span id="sunriseScoreTimeVal">60</span> דק'</span>
          </label>
        </div>
      </div>
    </div>
  </section>
  </main>

  <nav class="bottom-nav">
    <a class="bottom-nav__item bottom-nav__item--active" href="./index.html">
      <span class="bottom-nav__icon">🌅</span><span>תחזית</span>
    </a>
    <a class="bottom-nav__item" href="./spot.html">
      <span class="bottom-nav__icon">📍</span><span>Spots</span>
    </a>
    <button class="bottom-nav__item" id="btnNotifNav" type="button" onclick="toggleNotifPanel()">
      <span class="bottom-nav__icon">🔔</span><span>התראות</span>
    </button>
    <a class="bottom-nav__item" href="./privacy-policy.html">
      <span class="bottom-nav__icon">⋯</span><span>פרטיות</span>
    </a>
  </nav>

  <script src="./js/app.js"></script>
  <script src="./js/sun.js"></script>
  <script src="./js/favorites.js"></script>
  <script src="./js/forecast.js"></script>
  <script src="./js/notifications.js"></script>
</body>
</html>
