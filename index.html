<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TWILIGHT">
  <meta name="theme-color" content="#3B1F08">
  <title>TWILIGHT · דמדומים</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Rubik:wght@300;400;500;600;700;900&family=Playfair+Display:ital,wght@1,700&family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Leaflet CSS is loaded lazily by spots-screen.js when the map tab is opened -->

  <!-- App CSS -->
  <link rel="stylesheet" href="css/app.css">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Apple touch icons -->
  <link rel="apple-touch-icon" href="images/icon-192.png">
</head>
<body>

  <!-- Background + overlay (always visible) -->
  <div class="bg-sunset"></div>
  <div class="overlay"></div>

  <!-- ═══ SCREENS ═══ -->

  <div id="screen-main"     class="screen active"></div>
  <div id="screen-spots"    class="screen"></div>
  <div id="screen-settings" class="screen"></div>

  <!-- ═══ BOTTOM NAV ═══ -->
  <nav class="bottom-nav">

    <!-- Main / Home -->
    <div class="nav-item active" data-screen="main">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </div>
      <span class="nav-label">תחזית</span>
    </div>

    <!-- Spots / Finder -->
    <div class="nav-item" data-screen="spots">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
      </div>
      <span class="nav-label">ספוטים</span>
    </div>

    <!-- Settings -->
    <div class="nav-item" data-screen="settings">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </div>
      <span class="nav-label">הגדרות</span>
    </div>

  </nav>

  <!-- ═══ GLOBAL UI ═══ -->
  <div id="toast" class="toast"></div>
  <div id="loading" class="loading hidden">
    <div class="loading-inner">
      <div class="loading-spinner"></div>
      <div class="loading-text">טוען נתונים...</div>
    </div>
  </div>

  <!-- App Entry Point -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
