<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07040f" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Heebo:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./css/app.css" />
  <title>Spot Finder • דמדומים</title>

  <style>
    html, body { height:100%; overflow:hidden; }

    .spot-layout {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── Top bar ── */
    .spot-topbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px 8px;
      background: rgba(7,4,15,0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding-top: max(12px, env(safe-area-inset-top));
      z-index: 10;
    }
    .spot-brand { flex:1 }
    .spot-brand__title { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:600; color:var(--gold2); }
    .spot-brand__sub   { font-size:11px; color:var(--muted); }
    .back-btn {
      text-decoration:none; font-size:12px; color:var(--muted);
      background:rgba(255,255,255,.05); border:1px solid var(--border);
      border-radius:8px; padding:6px 12px; white-space:nowrap;
    }

    /* ── Map — ללא רווח ── */
    #spotMap {
      flex: 0 0 38vh;
      min-height: 200px;
      max-height: 320px;
      width: 100%;
      display: block;         /* מונע gap של inline */
      position: relative;
      z-index: 1;
    }

    /* Leaflet overrides */
    .leaflet-container { background:#07040f; font-family:'Heebo',sans-serif; }
    .leaflet-tile-pane { filter:brightness(1.05) saturate(0.75); }
    .spot-popup .leaflet-popup-content-wrapper {
      background:rgba(14,8,28,.96); backdrop-filter:blur(20px);
      border:1px solid rgba(240,180,60,.22); border-radius:16px;
      box-shadow:0 8px 32px rgba(0,0,0,.7); color:#f4e8d4; padding:0;
    }
    .spot-popup .leaflet-popup-content { margin:14px 16px; }
    .spot-popup .leaflet-popup-tip { background:rgba(14,8,28,.96); }
    .spot-popup .leaflet-popup-close-button {
      color:rgba(244,232,212,.4)!important; font-size:18px!important;
      top:8px!important; left:10px!important; right:auto!important;
    }
    .spot-tooltip {
      background:rgba(14,8,28,.9); border:1px solid rgba(240,180,60,.22);
      border-radius:8px; color:#ffd46a; font-size:12px; font-weight:600; padding:4px 10px;
    }

    /* ── Scrollable panel ── */
    .spot-panel {
      flex: 1 1 auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: var(--bg);
    }
    .spot-panel::-webkit-scrollbar { width:4px; }
    .spot-panel::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12); border-radius:99px; }

    .panel-inner { max-width:520px; margin:0 auto; padding:12px 14px 60px; }

    /* ── Controls ── */
    .controls-card {
      background:linear-gradient(145deg,rgba(255,255,255,.042),rgba(255,255,255,.016));
      border:1px solid var(--border); border-radius:18px;
      padding:14px 16px; margin-bottom:12px;
    }
    .controls-title { font-family:'Cormorant Garamond',serif; font-size:16px; font-weight:600; color:var(--gold); margin-bottom:12px; }
    .controls-grid { display:flex; flex-direction:column; gap:10px; }
    .field { display:flex; align-items:center; gap:8px; }
    .field__label { font-size:12px; color:var(--muted); min-width:70px; }
    .range { flex:1; accent-color:var(--gold); }
    .pill { font-size:12px; color:var(--text); min-width:50px; text-align:left; }
    .select {
      flex:1; background:rgba(255,255,255,.06); border:1px solid var(--border);
      border-radius:10px; padding:6px 10px; color:var(--text);
      font-family:'Heebo',sans-serif; font-size:13px;
    }

    /* ── Type filters ── */
    .type-filters { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
    .type-chip {
      display:flex; align-items:center; gap:4px;
      background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
      border-radius:20px; padding:4px 10px; cursor:pointer;
      font-size:12px; color:var(--muted); transition:all .2s;
      user-select:none;
    }
    .type-chip input { display:none; }
    .type-chip.checked { background:rgba(240,165,50,.15); border-color:rgba(240,165,50,.4); color:var(--gold); }

    /* ── List items ── */
    .item {
      background:var(--surface); border:1px solid var(--border);
      border-radius:16px; padding:14px; margin-bottom:10px;
      display:flex; gap:10px; align-items:flex-start;
      transition:border-color .25s, transform .15s;
    }
    .item:hover { transform:translateX(-2px); }
    .item__left { flex:1; min-width:0; }
    .item__title { font-size:14px; font-weight:600; color:var(--text); margin-bottom:4px; display:flex; align-items:center; gap:6px; }
    .item__meta  { display:flex; flex-wrap:wrap; gap:4px; }
    .item__score {
      min-width:44px; height:44px; border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      font-size:20px; font-weight:700; color:var(--text); flex-shrink:0;
    }
    .badge {
      font-size:10px; padding:2px 7px; border-radius:8px;
      background:rgba(255,255,255,.06); color:var(--muted);
    }

    /* ── Map placeholder ── */
    .map-placeholder {
      position:absolute; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      color:rgba(244,232,212,.35); font-size:13px; gap:8px;
      pointer-events:none; z-index:2;
    }
    .map-placeholder-icon { font-size:36px; }

    #resultSummary { font-size:12px; color:var(--muted); margin-bottom:10px; min-height:18px; }
    .source-hint   { font-size:11px; color:rgba(244,232,212,.28); text-align:center; margin:6px 0 14px; }
    #savedSpots    { margin-bottom:14px; }
  </style>
</head>
<body>
<div class="spot-layout">

  <!-- Top bar -->
  <div class="spot-topbar">
    <div class="spot-brand">
      <div class="spot-brand__title">🔭 Spot Finder</div>
      <div class="spot-brand__sub">נקודות תצפית לשקיעה מושלמת</div>
    </div>
    <a href="./index.html" class="back-btn">← חזור</a>
  </div>

  <!-- Map — ישירות אחרי ה-topbar, ללא רווח -->
  <div id="spotMap">
    <div class="map-placeholder" id="mapPlaceholder">
      <span class="map-placeholder-icon">🔭</span>
      <span>חפש נקודות תצפית — המפה תיטען כאן</span>
    </div>
  </div>

  <!-- Scrollable panel -->
  <div class="spot-panel">
    <div class="panel-inner">

      <!-- Hidden elements for app.js -->
      <span id="locInfo" style="display:none"></span>
      <span id="locCoords" style="display:none"></span>
      <button id="btnGps" style="display:none"></button>

      <!-- Search -->
      <div class="city-search-row" style="margin-bottom:10px">
        <input class="city-input" id="placeInput" type="text" placeholder="חפש עיר / כתובת..."
               inputmode="search"
               onkeydown="if(event.key==='Enter') document.getElementById('btnSearch').click()" />
        <button class="city-search-btn" id="btnSearch">🔍</button>
      </div>

      <!-- Controls -->
      <div class="controls-card">
        <div class="controls-title">הגדרות חיפוש</div>
        <div class="controls-grid">
          <div class="field">
            <span class="field__label">רדיוס</span>
            <input class="range" id="radiusKm" type="range" min="2" max="30" value="12" step="1" />
            <span class="pill"><span id="radiusVal">12</span> ק"מ</span>
          </div>
          <div class="field">
            <span class="field__label">תוצאות</span>
            <select class="select" id="topN">
              <option value="5">5 נקודות</option>
              <option value="8" selected>8 נקודות</option>
              <option value="12">12 נקודות</option>
              <option value="20">20 נקודות</option>
            </select>
          </div>
        </div>

        <!-- סינון סוגים -->
        <div style="font-size:12px;color:var(--muted);margin:10px 0 6px">סוג מקום:</div>
        <div class="type-filters">
          <label class="type-chip checked"><input type="checkbox" class="type-filter" value="viewpoint" checked>🔭 תצפית</label>
          <label class="type-chip checked"><input type="checkbox" class="type-filter" value="peak" checked>⛰️ פסגה</label>
          <label class="type-chip checked"><input type="checkbox" class="type-filter" value="hill" checked>🏔️ גבעה</label>
          <label class="type-chip checked"><input type="checkbox" class="type-filter" value="tower" checked>🗼 מגדל</label>
          <label class="type-chip"><input type="checkbox" class="type-filter" value="beach">🏖️ חוף</label>
          <label class="type-chip"><input type="checkbox" class="type-filter" value="park">🌳 פארק</label>
        </div>

        <button class="btn-primary" id="btnFind" style="margin-top:12px;padding:10px 20px;width:auto">🔭 מצא נקודות</button>
      </div>

      <!-- Saved spots -->
      <div id="savedSpots" class="controls-card" style="display:none"></div>

      <!-- Results -->
      <div id="resultsCard" style="display:none">
        <div id="resultSummary"></div>
        <div id="results"></div>
        <div class="source-hint">נתוני מיקום: OpenStreetMap · גובה: Open-Meteo</div>
      </div>

    </div>
  </div>
</div>

<script src="./js/app.js"></script>
<script src="./js/sun.js"></script>
<script src="./js/favorites.js"></script>
<script src="./js/spotfinder.js"></script>

<script>
  // Type chip toggle
  document.querySelectorAll('.type-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      chip.classList.toggle('checked');
    });
  });
</script>
</body>
</html>
