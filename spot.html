<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f2e6d7" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/app.css" />
  <title>Spot Finder • דמדומים</title>
</head>
<body class="spots-body">
  <main class="app-shell app-shell--spots">
    <section class="hero hero--spots">
      <div class="hero__bg" style="background-image:url('./assets/backgrounds/hero-bright-pastel.png')"></div>
      <div class="hero__overlay hero__overlay--light"></div>
      <div class="hero__top">
        <a class="ghost-btn" href="./index.html">Forecast</a>
        <img class="app-badge" src="./icons/icon-192.png" alt="דמדומים" />
      </div>
      <div class="hero__content">
        <div class="eyebrow">SPOT FINDER</div>
        <h1 class="hero__title">Sunset spots</h1>
        <p class="hero__subtitle">מציאת נקודות צפייה לשקיעה לפי מיקום, מרחק, גובה וכיוון אופק.</p>
        <div class="card card--glass card--compact">
          <div class="location-mini">
            <div>
              <div class="label">מרכז חיפוש</div>
              <strong id="locInfo">מאתר מיקום…</strong>
              <div class="muted" id="locCoords"></div>
            </div>
            <button id="btnGps" class="icon-btn" type="button" aria-label="GPS">📍</button>
          </div>
          <div class="search-inline">
            <button class="icon-btn" id="btnSearch" type="button" aria-label="חפש">🔎</button>
            <input class="city-input" id="placeInput" type="text" placeholder="חפש עיר / כתובת..." inputmode="search"
                   onkeydown="if(event.key==='Enter') document.getElementById('btnSearch').click()" />
          </div>
        </div>
      </div>
    </section>

    <section class="page page--spots">
      <div class="controls-card">
        <div class="controls-title">חיפוש לוקיישנים</div>
        <div class="controls-stack">
          <label class="field-row">
            <span class="field-row__label">רדיוס</span>
            <input id="radiusKm" class="range-input" type="range" min="5" max="80" step="1" value="24" />
            <span class="field-row__value"><span id="radiusVal">24</span> ק"מ</span>
          </label>
          <label class="field-row">
            <span class="field-row__label">כמה תוצאות</span>
            <select id="topN" class="select-input">
              <option value="8">8</option>
              <option value="12" selected>12</option>
              <option value="16">16</option>
            </select>
          </label>
          <button class="pill-btn pill-btn--primary" id="btnFind" type="button">מצא נקודות</button>
        </div>
      </div>

      <div id="spotMap" class="map-card" aria-label="מפה"></div>

      <div id="savedSpots" class="controls-card" style="display:none"></div>

      <section id="resultsCard" class="results-card" style="display:none">
        <div id="resultSummary" class="result-summary"></div>
        <div id="results" class="results-list"></div>
      </section>
    </section>
  </main>

  <nav class="bottom-nav">
    <a class="bottom-nav__item" href="./index.html"><span class="bottom-nav__icon">☼</span><span>תחזית</span></a>
    <a class="bottom-nav__item bottom-nav__item--active" href="./spot.html"><span class="bottom-nav__icon">⌾</span><span>Spots</span></a>
    <a class="bottom-nav__item" href="./privacy-policy.html"><span class="bottom-nav__icon">⋯</span><span>פרטיות</span></a>
  </nav>

  <script src="./js/app.js"></script>
  <script src="./js/sun.js"></script>
  <script src="./js/favorites.js"></script>
  <script src="./js/spotfinder.js"></script>
</body>
</html>
